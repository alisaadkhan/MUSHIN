<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & icons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/mushin-icon-32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="/mushin-icon-16.png" type="image/png" sizes="16x16">
    <link rel="apple-touch-icon" href="/mushin-icon-256.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0c0c0c">
    <meta property="og:image" content="/mushin-icon-512.png">

    <!-- Primary SEO -->
    <title>MUSHIN — creator search and campaigns</title>
    <meta name="description" content="Search creators, manage lists, and run campaign workflows in one web app. Subscription and credits apply for live features." />
    <meta name="author" content="MUSHIN" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mushin.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="MUSHIN — creator search and campaigns" />
    <meta property="og:description" content="Search creators, manage lists, and run campaign workflows in one web app." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mushin.app/" />
    <meta property="og:site_name" content="MUSHIN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MUSHIN" />
    <meta name="twitter:title" content="MUSHIN – Creator Intelligence Platform" />
    <meta name="twitter:description" content="Find verified Pakistani creators, detect fraud, and run outreach campaigns from one workspace." />

    <!-- DNS preconnect — eliminates TLS handshake latency for critical third-party origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ui-avatars.com" />
    <link rel="dns-prefetch" href="https://xfeikbhprbqwzdhyjnou.supabase.co" />

    <!-- Google Fonts: optimized for LCP -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!-- Structured data for rich search results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MUSHIN",
      "applicationCategory": "BusinessApplication",
      "description": "Pakistan's Creator Intelligence Platform — find verified Pakistani creators, detect fraud, and run outreach campaigns.",
      "url": "https://mushin.app",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "Subscription",
        "priceCurrency": "USD",
        "description": "Subscription required"
      },
      "publisher": {
        "@type": "Organization",
        "name": "MUSHIN",
        "url": "https://mushin.app"
      }
    }
    </script>
  </head>

  <body>
    <div id="root" style="background:#0c0c0c;min-height:100vh">
      <!-- Loading screen to prevent white flash -->
      <div id="loading-screen" style="position:fixed;inset:0;background:#0c0c0c;display:flex;align-items:center;justify-content:center;z-index:9999">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid rgba(37,99,235,0.35);border-top-color:#2563eb;border-radius:50%;animation:spin 0.85s linear infinite;margin:0 auto 14px"></div>
          <p style="color:rgba(255,255,255,0.55);font-family:system-ui,sans-serif;font-size:14px;line-height:1.5">Loading…</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <noscript>
      <div style="color:white;background:#0a0114;padding:3rem;font-family:sans-serif;text-align:center">
        <strong>JavaScript is required to use MUSHIN.</strong><br/>Please enable JavaScript in your browser settings.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
