<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & icons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/mushin-icon-32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="/mushin-icon-16.png" type="image/png" sizes="16x16">
    <link rel="apple-touch-icon" href="/mushin-icon-256.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0A0416">
    <meta property="og:image" content="/mushin-icon-512.png">

    <!-- Primary SEO -->
    <title>MUSHIN — Creator Intelligence</title>
    <meta name="description" content="Find verified Pakistani creators, detect fraud, and run outreach campaigns from one workspace. Used by 2,800+ marketing teams." />
    <meta name="author" content="MUSHIN" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mushin.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="MUSHIN – Creator Intelligence That Pays for Itself" />
    <meta property="og:description" content="Find verified Pakistani creators, detect fraud, and run outreach campaigns from one workspace." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mushin.app/" />
    <meta property="og:site_name" content="MUSHIN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MUSHIN" />
    <meta name="twitter:title" content="MUSHIN – Creator Intelligence Platform" />
    <meta name="twitter:description" content="Find verified Pakistani creators, detect fraud, and run outreach campaigns from one workspace." />

    <!-- DNS preconnect — eliminates TLS handshake latency for critical third-party origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ui-avatars.com" />
    <link rel="dns-prefetch" href="https://xfeikbhprbqwzdhyjnou.supabase.co" />

    <!--
      Google Fonts loaded via <link> with display=swap (not CSS @import).
      This allows the browser to render text immediately with fallback fonts
      while the custom font loads in the background — eliminates render blocking.
      Only the weights actually used in the app are requested.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&display=swap"
      />
    </noscript>

    <!-- Structured data for rich search results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MUSHIN",
      "applicationCategory": "BusinessApplication",
      "description": "Pakistan's Creator Intelligence Platform — find verified Pakistani creators, detect fraud, and run outreach campaigns.",
      "url": "https://mushin.app",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier available"
      },
      "publisher": {
        "@type": "Organization",
        "name": "MUSHIN",
        "url": "https://mushin.app"
      }
    }
    </script>
  </head>

  <body>
    <div id="root" style="background:#0a0114;min-height:100vh">
      <!-- Loading screen to prevent white flash -->
      <div id="loading-screen" style="position:fixed;inset:0;background:#0a0114;display:flex;align-items:center;justify-content:center;z-index:9999">
        <div style="text-align:center">
          <div style="width:48px;height:48px;border:4px solid #7c3aed;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>
          <p style="color:#a78bfa;font-family:monospace;font-size:14px">Loading MUSHIN...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <noscript>
      <div style="color:white;background:#0a0114;padding:3rem;font-family:sans-serif;text-align:center">
        <strong>JavaScript is required to use MUSHIN.</strong><br/>Please enable JavaScript in your browser settings.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loading screen when app signals it's ready
      window.addEventListener('app-ready', function() {
        var loading = document.getElementById('loading-screen');
        if (loading) {
          setTimeout(function() {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.3s ease';
            setTimeout(function() {
              loading.style.display = 'none';
            }, 300);
          }, 500);
        }
      });
      
      // Fallback: remove after 10 seconds even if app doesn't signal
      setTimeout(function() {
        var loading = document.getElementById('loading-screen');
        if (loading && loading.style.display !== 'none') {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.3s ease';
          setTimeout(function() {
            loading.style.display = 'none';
          }, 300);
        }
      }, 10000);
    </script>
  </body>
</html>
