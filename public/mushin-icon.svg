<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="blade" x1="16" y1="3" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DDB6FF"/>
      <stop offset="100%" stop-color="#9955EE"/>
    </linearGradient>
    <filter id="jglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Opaque dark body — works on any background -->
  <path d="M16 1L31 16L16 31L1 16Z" fill="#0A0416" stroke="#9B4FE8" stroke-width="1.1"/>
  <!-- Upper blade -->
  <path d="M16 5.5 L19.8 15.5 L16 14.2 L12.2 15.5 Z" fill="url(#blade)"/>
  <!-- Lower shard (dim) -->
  <path d="M16 26.5 L12.8 17 L16 18 L19.2 17 Z" fill="#7C3AED" opacity="0.45"/>
  <!-- Tsuba crossguard -->
  <line x1="10.5" y1="16" x2="21.5" y2="16" stroke="#A855F7" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Jewel -->
  <circle cx="16" cy="16" r="2.6" fill="#8B3FD4" filter="url(#jglow)"/>
  <circle cx="16" cy="16" r="1.4" fill="#DDB6FF"/>
</svg>